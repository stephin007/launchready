kind = "web"
previewPath = "/"
title = "LaunchReady"
version = "1.0.0"
id = "artifacts/launchready"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23511

[services.development]
run = "pnpm --filter @workspace/launchready run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/launchready", "run", "build" ]
publicDir = "artifacts/launchready/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23511"
BASE_PATH = "/"
